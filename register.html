<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="col-md-6">
            <form onsubmit="storeData()">
                <input type="text" placeholder="Enter Your name " id="name" class="form-control mb-3">
                <input type="email" placeholder="Enter Your Email " id="email" class="form-control mb-3">
                <input type="password" placeholder="Enter Password " id="password" class="form-control mb-3">
                <input type="password" placeholder="Confrim Password " id="cpassword" class="form-control mb-3">
                <button class="btn btn-primary"> Register</button>

            </form>

        </div>

    </div>
    <script>
        async function storeData() {
            event.preventDefault()
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;
            let cpassword = document.getElementById("cpassword").value;
            let user = { Username: name, Useremail: email, upassword: password };
            if (password == cpassword) {
                const result = await fetch("http://localhost:3000/Users", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(user)
                });
                let data =  await result.json();
                console.log(data);
                alert("registered successfully")
            }
            else {
                alert('passWord and confrim password must me same');
            }

        }
    </script>
 
</body>

</html>
